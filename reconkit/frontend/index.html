<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RECON-KIT // CLASSIFIED</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:     #0c0c0a;
      --bg2:    #111109;
      --bg3:    #161612;
      --amber:  #c8952a;
      --amber2: #e8b84b;
      --amber3: #f0cc6e;
      --olive:  #6b7c3a;
      --olive2: #8a9e4a;
      --dim:    #3a3a30;
      --muted:  #5a5a48;
      --text:   #c8c4a8;
      --text2:  #9a9680;
      --text3:  #6a6855;
      --green:  #4a8c5c;
      --red:    #8c3a3a;
      --border: rgba(200,149,42,0.18);
      --border2:rgba(200,149,42,0.08);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden;cursor:default;}
    #root{height:100vh;position:relative;}

    /* ── BOOT ── */
    .boot{
      position:fixed;inset:0;z-index:9999;
      background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
      transition:opacity 0.6s ease;
    }
    .boot.out{opacity:0;pointer-events:none;}

    .boot-stamp{
      font-family:'Barlow Condensed',sans-serif;
      font-size:11px;font-weight:600;letter-spacing:6px;
      color:var(--amber);text-transform:uppercase;
      border:2px solid var(--amber);
      padding:4px 18px;margin-bottom:32px;
      opacity:0;animation:fadeUp 0.3s 0.1s ease forwards;
    }
    .boot-title{
      font-family:'Barlow Condensed',sans-serif;
      font-size:42px;font-weight:700;
      color:var(--text);letter-spacing:8px;text-transform:uppercase;
      opacity:0;animation:fadeUp 0.4s 0.3s ease forwards;
      margin-bottom:6px;
    }
    .boot-title span{color:var(--amber);}
    .boot-serial{
      font-family:'Share Tech Mono',monospace;font-size:10px;
      color:var(--text3);letter-spacing:4px;
      opacity:0;animation:fadeUp 0.3s 0.5s ease forwards;
      margin-bottom:36px;
    }

    .boot-log{
      width:500px;height:160px;overflow:hidden;
      background:var(--bg2);border:1px solid var(--border);
      padding:14px 16px;
      opacity:0;animation:fadeUp 0.3s 0.6s ease forwards;
      margin-bottom:24px;
    }
    .blog-line{
      font-family:'Share Tech Mono',monospace;font-size:10px;
      line-height:1.9;color:var(--text2);
      opacity:0;animation:lineIn 0.05s forwards;
    }
    .blog-line.ok{color:var(--olive2);}
    .blog-line.warn{color:var(--amber);}

    .boot-prog-wrap{
      width:500px;opacity:0;animation:fadeUp 0.3s 0.7s ease forwards;
    }
    .boot-prog-top{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:5px;}
    .boot-prog-bar{height:2px;background:var(--dim);}
    .boot-prog-fill{height:100%;background:var(--amber);transition:width 0.04s linear;}
    .boot-prog-pct{font-family:'Barlow Condensed',monospace;font-size:28px;font-weight:700;color:var(--amber);text-align:center;margin-top:14px;letter-spacing:3px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    @keyframes lineIn{to{opacity:1;}}

    /* ── LAYOUT ── */
    .app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:240px 1fr;height:100vh;overflow:hidden;}

    /* ── HEADER ── */
    .header{
      grid-column:1/-1;
      background:var(--bg2);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:16px;padding:0 20px;
    }
    .classif{
      font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
      letter-spacing:4px;color:var(--amber);
      border:1px solid var(--amber);padding:3px 10px;
    }
    .h-title{
      font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;
      color:var(--text);letter-spacing:4px;text-transform:uppercase;
    }
    .h-title span{color:var(--amber);}
    .h-serial{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;}
    .h-divider{width:1px;height:24px;background:var(--border);margin:0 6px;}
    .hstat{display:flex;flex-direction:column;align-items:center;}
    .hstat-v{font-family:'Barlow Condensed',monospace;font-size:15px;font-weight:700;color:var(--amber);}
    .hstat-l{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:2px;}
    .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
    .hpill{
      font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);
      border:1px solid var(--border);padding:3px 10px;
      display:flex;align-items:center;gap:6px;letter-spacing:1px;
    }
    .live-dot{width:5px;height:5px;border-radius:50%;background:var(--olive2);animation:livePulse 2s ease-in-out infinite;}
    @keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.3;}}

    /* ── SIDEBAR ── */
    .sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding-bottom:20px;}
    .sidebar::-webkit-scrollbar{width:2px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--dim);}

    .mode-toggle{display:grid;grid-template-columns:1fr 1fr;margin:10px;gap:2px;}
    .mode-btn{border-radius:6px;
      padding:7px 4px;font-family:'Barlow Condensed',sans-serif;
      font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
      background:transparent;border:1px solid var(--dim);
      cursor:pointer;color:var(--text3);transition:all .15s;
    }
    .mode-btn.active{background:rgba(200,149,42,.1);color:var(--amber);border-color:var(--amber);}
    .mode-btn:hover:not(.active){border-color:var(--muted);color:var(--text2);}

    .cat-label{
      padding:12px 14px 4px;
      font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:600;
      color:var(--text3);letter-spacing:4px;text-transform:uppercase;
      border-bottom:1px solid var(--border2);margin-bottom:2px;
    }
    .tool-item{
      display:flex;align-items:center;gap:10px;
      padding:6px 14px;cursor:pointer;
      font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:500;
      color:var(--text2);letter-spacing:.5px;
      border-left:2px solid transparent;transition:all .12s;
    }
    .tool-item:hover{color:var(--text2);border-left-color:var(--muted);background:rgba(200,149,42,.03);}
    .tool-item.active{color:var(--amber);border-left-color:var(--amber);background:rgba(200,149,42,.06);}
    .tool-item.dim{opacity:.35;cursor:default;pointer-events:none;}
    .t-icon{font-size:11px;min-width:16px;text-align:center;opacity:.7;}

    /* ── MAIN ── */
    .main{display:grid;grid-template-rows:1fr 1fr;overflow:hidden;}

    /* ── HUD PANEL ── */
    .hud-panel{padding:18px 22px;overflow-y:auto;border-bottom:1px solid var(--border);background:var(--bg);}
    .hud-panel::-webkit-scrollbar{width:2px;}
    .hud-panel::-webkit-scrollbar-thumb{background:var(--dim);}

    /* ── WELCOME ── */
    .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;}
    .w-stamp{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:5px;color:var(--amber);border:1px solid var(--amber);padding:3px 14px;margin-bottom:4px;}
    .w-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;color:var(--text);letter-spacing:6px;text-transform:uppercase;}
    .w-title span{color:var(--amber);}
    .w-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:3px;}
    .w-hint{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;animation:blink2 2s step-end infinite;}
    @keyframes blink2{0%,100%{opacity:.5;}50%{opacity:1;}}
    .w-stats{display:flex;gap:1px;margin-top:8px;}
    .w-stat{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border);padding:8px 20px;}
    .w-stat-n{font-family:'Barlow Condensed',monospace;font-size:22px;font-weight:700;color:var(--amber);}
    .w-stat-l{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--text3);letter-spacing:2px;}

    /* ── TOOL FORM ── */
    .tool-hdr{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
    .tool-tag{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:3px;color:var(--amber);border:1px solid var(--border);padding:2px 8px;}
    .tool-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--text);letter-spacing:2px;text-transform:uppercase;}
    .tool-desc{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:16px;}

    .form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
    .form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px;}
    .form-label{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;}
    .form-input,.form-select{
      background:var(--bg3);border:1px solid var(--dim);
      color:var(--text);padding:8px 12px;
      font-family:'Share Tech Mono',monospace;font-size:12px;
      outline:none;width:100%;transition:border-color .15s;
    }
    .form-input:focus,.form-select:focus{border-color:var(--amber);}
    .form-input::placeholder{color:var(--text3);}
    .form-select{cursor:pointer;}
    .form-select option{background:var(--bg2);}

    .btn-exec{border-radius:6px;
      background:rgba(200,149,42,.1);border:1px solid var(--amber);
      color:var(--amber);padding:9px 24px;
      font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      cursor:pointer;letter-spacing:3px;text-transform:uppercase;
      transition:all .15s;
    }
    .btn-exec:hover{background:rgba(200,149,42,.2);box-shadow:0 0 12px rgba(200,149,42,.15);}
    .btn-exec:disabled{opacity:.3;cursor:not-allowed;}

    /* ── RUN ALL ── */
    .ra-wrap{display:flex;flex-direction:column;gap:14px;}
    .ra-header{
      font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;
      color:var(--text3);letter-spacing:5px;text-transform:uppercase;
      display:flex;align-items:center;gap:10px;
    }
    .ra-header::after{content:'';flex:1;height:1px;background:var(--border2);}

    .target-row{display:flex;gap:8px;}
    .target-input{
      flex:1;background:var(--bg3);border:1px solid var(--dim);
      border-bottom:2px solid var(--amber);
      color:var(--amber);padding:11px 14px;
      font-family:'Share Tech Mono',monospace;font-size:13px;
      letter-spacing:2px;outline:none;transition:all .15s;
    }
    .target-input:focus{border-color:var(--amber);background:rgba(200,149,42,.04);}
    .target-input::placeholder{color:var(--text3);font-size:10px;letter-spacing:1px;}
    .target-input:disabled{opacity:.5;}

    .btn-engage{border-radius:6px;
      background:var(--amber);border:1px solid var(--amber);
      color:var(--bg);padding:11px 22px;
      font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:3px;cursor:pointer;text-transform:uppercase;
      transition:all .15s;white-space:nowrap;
    }
    .btn-engage:hover{background:var(--amber2);box-shadow:0 0 16px rgba(200,149,42,.3);}
    .btn-engage:disabled{opacity:.3;cursor:not-allowed;}
    .btn-abort{border-radius:6px;
      background:transparent;border:1px solid var(--red);
      color:#b05050;padding:11px 16px;
      font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
      letter-spacing:2px;cursor:pointer;text-transform:uppercase;transition:all .15s;
    }
    .btn-abort:hover{background:rgba(140,58,58,.15);}

    .prog-top{display:flex;justify-content:space-between;align-items:center;}
    .prog-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:2px;}
    .prog-pct{font-family:'Barlow Condensed',monospace;font-size:18px;font-weight:700;color:var(--amber);}
    .prog-bar{height:2px;background:var(--dim);}
    .prog-fill{height:100%;background:var(--amber);transition:width .4s;}

    .status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:3px;}
    .sc{
      display:flex;align-items:center;gap:8px;
      background:var(--bg3);border-left:2px solid var(--dim);
      padding:5px 10px;font-size:10px;transition:all .2s;
    }
    .sc.running{border-left-color:var(--amber);background:rgba(200,149,42,.05);}
    .sc.done{border-left-color:var(--green);}
    .sc.error{border-left-color:var(--red);}
    .sc-icon{font-size:11px;min-width:14px;text-align:center;opacity:.6;}
    .sc-name{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.5px;}
    .sc-state{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1px;}
    .s-p{color:var(--dim);}
    .s-r{color:var(--amber);animation:blink2 .8s infinite;}
    .s-d{color:var(--green);}
    .s-e{color:var(--red);}
    .s-s{color:var(--dim);}

    .hint-box{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);line-height:2.2;letter-spacing:.5px;}
    .hint-box strong{color:var(--amber);}

    /* ── TERMINAL ── */
    .terminal{background:var(--bg2);padding:14px 20px;overflow-y:auto;position:relative;}
    .terminal::-webkit-scrollbar{width:2px;}
    .terminal::-webkit-scrollbar-thumb{background:var(--dim);}

    .term-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border2);}
    .term-dot{width:7px;height:7px;border-radius:50%;}
    .term-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;flex:1;}
    .btn-purge{border-radius:4px;background:transparent;border:1px solid var(--dim);color:var(--text3);padding:2px 10px;font-family:'Share Tech Mono',monospace;font-size:8px;cursor:pointer;letter-spacing:2px;transition:all .15s;}
    .btn-purge:hover{border-color:var(--red);color:#b05050;}

    .result-block{margin-bottom:16px;animation:rIn .2s ease-out;}
    @keyframes rIn{from{opacity:0;}to{opacity:1;}}
    .result-prompt{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--amber);margin-bottom:4px;letter-spacing:2px;}
    .result-tool{color:var(--olive2);}
    .result-body{white-space:pre-wrap;word-break:break-all;font-family:'Share Tech Mono',monospace;font-size:10px;line-height:1.8;color:var(--text2);border-left:2px solid var(--border2);padding-left:12px;margin-top:4px;}
    .result-err{color:#a06060;border-left-color:rgba(140,58,58,.3);}
    .result-div{border:none;border-top:1px solid var(--border2);margin:10px 0;}

    .term-empty{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);}
    .cur{display:inline-block;width:7px;height:12px;background:var(--amber);vertical-align:middle;margin-left:4px;animation:blink 1s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
    .spinner{display:inline-block;width:10px;height:10px;border:1px solid var(--dim);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;
const API="http://localhost:8000";

const TOOLS=[
  {id:"nmap",      name:"Nmap Scanner",    icon:"▸",cat:"NETWORK",  desc:"Port scanning & service detection"},
  {id:"banner",    name:"Banner Grabber",   icon:"▸",cat:"NETWORK",  desc:"Grab service banners from ports"},
  {id:"traceroute",name:"Traceroute",       icon:"▸",cat:"NETWORK",  desc:"Trace network path to host"},
  {id:"shodan",    name:"Shodan Intel",     icon:"▸",cat:"OSINT",    desc:"Search internet-connected devices"},
  {id:"harvester", name:"theHarvester",     icon:"▸",cat:"OSINT",    desc:"Harvest emails & subdomains"},
  {id:"hibp",      name:"HIBP Breach",      icon:"▸",cat:"OSINT",    desc:"Email breach check"},
  {id:"wayback",   name:"Wayback Machine",  icon:"▸",cat:"OSINT",    desc:"View archived snapshots"},
  {id:"dorking",   name:"Google Dorking",   icon:"▸",cat:"WEB RECON",desc:"Generate advanced dork queries"},
  {id:"subdomain", name:"Subdomain Finder", icon:"▸",cat:"WEB RECON",desc:"DNS subdomain enumeration"},
  {id:"ssl",       name:"SSL/TLS Info",     icon:"▸",cat:"WEB RECON",desc:"SSL certificate analysis"},
  {id:"whois",     name:"WHOIS Lookup",     icon:"▸",cat:"DNS & IP", desc:"Domain registration info"},
  {id:"dns",       name:"DNS Lookup",       icon:"▸",cat:"DNS & IP", desc:"Query DNS records"},
  {id:"ipgeo",     name:"IP Geolocation",   icon:"▸",cat:"DNS & IP", desc:"Geolocate an IP address"},
  {id:"reverseip", name:"Reverse IP",       icon:"▸",cat:"DNS & IP", desc:"Find domains on same IP"},
];

const BOOT_LINES=[
  {t:250, cls:"",   txt:"RECON-KIT v2.0 — initializing..."},
  {t:550, cls:"ok", txt:"[OK] cryptographic module loaded"},
  {t:800, cls:"",   txt:"[..] establishing secure channel"},
  {t:1100,cls:"ok", txt:"[OK] tunnel established — AES-256"},
  {t:1350,cls:"",   txt:"[..] loading recon modules (14/14)"},
  {t:1600,cls:"ok", txt:"[OK] Nmap 7.98 detected"},
  {t:1800,cls:"ok", txt:"[OK] theHarvester — online"},
  {t:2000,cls:"ok", txt:"[OK] Shodan API — ready"},
  {t:2250,cls:"warn",txt:"[!!] For educational use only — authorized targets only"},
  {t:2550,cls:"ok", txt:"[OK] system ready — access granted"},
];

async function callAPI(ep,body){
  const r=await fetch(`${API}${ep}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  const d=await r.json();if(!r.ok)throw new Error(d.detail||`HTTP ${r.status}`);return d;
}

function BootScreen({onDone}){
  const [lines,setLines]=useState([]);
  const [pct,setPct]=useState(0);
  const [out,setOut]=useState(false);

  useEffect(()=>{
    BOOT_LINES.forEach(({t,cls,txt})=>setTimeout(()=>setLines(p=>[...p,{cls,txt}]),t));
    const iv=setInterval(()=>setPct(p=>{if(p>=100){clearInterval(iv);return 100;}return p+1.4;}),35);
    setTimeout(()=>{setOut(true);setTimeout(onDone,700);},3400);
    return()=>clearInterval(iv);
  },[]);

  return(
    <div className={`boot${out?" out":""}`}>
      <div className="boot-stamp">CLASSIFIED // AUTHORIZED USE ONLY</div>
      <div className="boot-title">RECON<span>-</span>KIT</div>
      <div className="boot-serial">SYS-ID: RK-{Math.random().toString(36).substr(2,8).toUpperCase()} // ENCRYPTION: AES-256</div>
      <div className="boot-log">
        {lines.map((l,i)=>(
          <div key={i} className={`blog-line${l.cls==="ok"?" ok":l.cls==="warn"?" warn":""}`}
            style={{animationDelay:`${i*0}ms`}}>
            {l.txt}
          </div>
        ))}
      </div>
      <div className="boot-prog-wrap">
        <div className="boot-prog-top"><span>BOOT SEQUENCE</span><span>SYS-READY</span></div>
        <div className="boot-prog-bar"><div className="boot-prog-fill" style={{width:`${Math.min(100,pct)}%`}}/></div>
        <div className="boot-prog-pct">{Math.min(100,Math.round(pct))}<span style={{fontSize:13}}>%</span></div>
      </div>
    </div>
  );
}

function ToolForm({tool,onResult,loading,setLoading}){
  const [f,setF]=useState({});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const run=async(ep,body)=>{
    setLoading(true);
    try{const d=await callAPI(ep,body);onResult({ok:true,tool:tool.name,out:d.output});}
    catch(e){onResult({ok:false,tool:tool.name,out:e.message});}
    finally{setLoading(false);}
  };
  const Btn=({l,ll,fn})=>(
    <button className="btn-exec" disabled={loading} onClick={fn}>
      {loading?<span style={{display:'flex',alignItems:'center',gap:8}}><span className="spinner"/>{ll}</span>:l}
    </button>
  );
  const Fld=({label,id,ph,type="text",dv,sty})=>(
    <div className="form-group" style={sty}>
      <label className="form-label">{label}</label>
      <input className="form-input" type={type} placeholder={ph} defaultValue={dv}
        onChange={e=>set(id,type==="number"?parseInt(e.target.value):e.target.value)}/>
    </div>
  );
  const forms={
    nmap:<><div className="form-row"><Fld label="Target" id="target" ph="192.168.1.1 or example.com"/><Fld label="Flags" id="flags" ph="-sV -sC" dv="-sV -sC"/></div><Btn l="INITIATE SCAN" ll="SCANNING..." fn={()=>run("/api/nmap",{target:f.target,flags:f.flags||"-sV -sC"})}/></>,
    shodan:<><div className="form-row"><Fld label="Search Query" id="query" ph="apache port:80 country:IN"/><Fld label="API Key" id="api_key" type="password" ph="Shodan API Key" dv="u5i4Han5YrvMZQLb3Q63OtJAicYkmXeW"/></div><Btn l="SEARCH SHODAN" ll="SEARCHING..." fn={()=>run("/api/shodan",{query:f.query,api_key:f.api_key||"u5i4Han5YrvMZQLb3Q63OtJAicYkmXeW"})}/></>,
    whois:<><div className="form-row"><Fld label="Domain" id="domain" ph="example.com"/></div><Btn l="WHOIS QUERY" ll="QUERYING..." fn={()=>run("/api/whois",{domain:f.domain})}/></>,
    dns:<><div className="form-row"><Fld label="Domain" id="domain" ph="example.com"/><div className="form-group" style={{maxWidth:150}}><label className="form-label">Record Type</label><select className="form-select" onChange={e=>set("record_type",e.target.value)}>{["A","AAAA","MX","NS","TXT","CNAME","SOA","PTR"].map(r=><option key={r}>{r}</option>)}</select></div></div><Btn l="DNS RESOLVE" ll="RESOLVING..." fn={()=>run("/api/dns",{domain:f.domain,record_type:f.record_type||"A"})}/></>,
    subdomain:<><div className="form-row"><Fld label="Domain" id="domain" ph="example.com"/></div><Btn l="ENUMERATE SUBDOMAINS" ll="ENUMERATING..." fn={()=>run("/api/subdomain",{domain:f.domain})}/></>,
    ipgeo:<><div className="form-row"><Fld label="IP Address" id="ip" ph="8.8.8.8"/></div><Btn l="GEOLOCATE" ll="LOCATING..." fn={()=>run("/api/ipgeo",{ip:f.ip})}/></>,
    reverseip:<><div className="form-row"><Fld label="IP Address" id="ip" ph="93.184.216.34"/></div><Btn l="REVERSE LOOKUP" ll="REVERSING..." fn={()=>run("/api/reverseip",{ip:f.ip})}/></>,
    harvester:<><div className="form-row"><Fld label="Domain" id="domain" ph="example.com"/><Fld label="Sources" id="sources" ph="google,bing" dv="google,bing"/></div><Btn l="HARVEST" ll="HARVESTING..." fn={()=>run("/api/harvester",{domain:f.domain,sources:f.sources||"google,bing"})}/></>,
    hibp:<><div className="form-row"><Fld label="Email" id="email" ph="target@example.com"/><Fld label="HIBP API Key" id="api_key" type="password" ph="Optional"/></div><Btn l="CHECK BREACHES" ll="CHECKING..." fn={()=>run("/api/hibp",{email:f.email,api_key:f.api_key||""})}/></>,
    ssl:<><div className="form-row"><Fld label="Domain" id="domain" ph="example.com"/><Fld label="Port" id="port" type="number" ph="443" dv="443" sty={{maxWidth:120}}/></div><Btn l="ANALYZE SSL" ll="ANALYZING..." fn={()=>run("/api/ssl",{domain:f.domain,port:f.port||443})}/></>,
    wayback:<><div className="form-row"><Fld label="URL" id="url" ph="https://example.com"/></div><Btn l="ARCHIVE QUERY" ll="FETCHING..." fn={()=>run("/api/wayback",{url:f.url})}/></>,
    banner:<><div className="form-row"><Fld label="Host / IP" id="host" ph="example.com"/><Fld label="Port" id="port" type="number" ph="80" dv="80" sty={{maxWidth:120}}/></div><Btn l="GRAB BANNER" ll="GRABBING..." fn={()=>run("/api/banner",{host:f.host,port:f.port||80})}/></>,
    traceroute:<><div className="form-row"><Fld label="Host / IP" id="host" ph="example.com or 8.8.8.8"/></div><Btn l="TRACE ROUTE" ll="TRACING..." fn={()=>run("/api/traceroute",{host:f.host})}/></>,
    dorking:<><div className="form-row"><Fld label="Query" id="query" ph='intitle:"index of"'/><Fld label="Site (optional)" id="site" ph="example.com"/></div><Btn l="GENERATE DORKS" ll="GENERATING..." fn={()=>run("/api/dorking",{query:f.query,site:f.site||""})}/></>,
  };
  return forms[tool.id]||null;
}

function RunAllMode({onResult,clearResults}){
  const [target,setTarget]=useState("");
  const [running,setRunning]=useState(false);
  const [statuses,setStatuses]=useState({});
  const abort=useRef(false);
  const setSt=(id,s)=>setStatuses(p=>({...p,[id]:s}));
  const entries=Object.entries(statuses);
  const done=entries.filter(([,s])=>["done","error","skip"].includes(s)).length;
  const total=entries.length;
  const pct=total>0?Math.round((done/total)*100):0;

  const runOne=async(id,ep,body)=>{
    if(abort.current)return;
    const t=TOOLS.find(x=>x.id===id);setSt(id,"running");
    try{const d=await callAPI(ep,body);onResult({ok:true,tool:t.name,out:d.output});setSt(id,"done");}
    catch(e){onResult({ok:false,tool:t.name,out:e.message});setSt(id,"error");}
  };

  const startAll=async()=>{
    if(!target.trim())return;
    abort.current=false;clearResults();
    const raw=target.trim().replace(/^https?:\/\//,"").replace(/\/.*/,"");
    const init={};TOOLS.forEach(t=>{init[t.id]=["shodan","hibp"].includes(t.id)?"skip":"pending";});
    setStatuses(init);setRunning(true);
    let ip=raw;
    if(!/^(\d{1,3}\.){3}\d{1,3}$/.test(raw)){
      try{const r=await callAPI("/api/dns",{domain:raw,record_type:"A"});const m=r.output.match(/\[1\]\s+(\d+\.\d+\.\d+\.\d+)/);if(m)ip=m[1];}catch(_){}
    }
    await Promise.allSettled([
      runOne("whois","/api/whois",{domain:raw}),runOne("dns","/api/dns",{domain:raw,record_type:"A"}),
      runOne("subdomain","/api/subdomain",{domain:raw}),runOne("ssl","/api/ssl",{domain:raw,port:443}),
      runOne("wayback","/api/wayback",{url:`https://${raw}`}),runOne("dorking","/api/dorking",{query:raw,site:raw}),
      runOne("harvester","/api/harvester",{domain:raw,sources:"google,bing"}),
      runOne("ipgeo","/api/ipgeo",{ip}),runOne("reverseip","/api/reverseip",{ip}),
      runOne("banner","/api/banner",{host:raw,port:80}),runOne("traceroute","/api/traceroute",{host:raw}),
      runOne("nmap","/api/nmap",{target:raw,flags:"-sV --top-ports 100"}),
    ]);
    setRunning(false);
  };

  const stMap={pending:["STANDBY","s-p"],running:["ACTIVE","s-r"],done:["DONE","s-d"],error:["FAIL","s-e"],skip:["SKIP","s-s"]};
  return(
    <div className="ra-wrap">
      <div className="ra-header">FULL-SPECTRUM RECON PROTOCOL</div>
      <div className="target-row">
        <input className="target-input" placeholder="target — domain.com  or  IP address"
          value={target} onChange={e=>setTarget(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&!running&&startAll()} disabled={running}/>
        {!running
          ?<button className="btn-engage" onClick={startAll} disabled={!target.trim()}>ENGAGE</button>
          :<button className="btn-abort" onClick={()=>{abort.current=true;setRunning(false);}}>ABORT</button>
        }
      </div>
      {total>0&&<>
        <div className="prog-top">
          <span className="prog-lbl">{running?`scanning: ${target}`:pct===100?"complete":"aborted"}</span>
          <span className="prog-pct">{pct}%</span>
        </div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
        <div className="status-grid">
          {TOOLS.map(t=>{const s=statuses[t.id]||"pending";const[lbl,cls]=stMap[s];return(
            <div key={t.id} className={`sc ${s}`}>
              <span className="sc-icon">{t.icon}</span>
              <span className="sc-name">{t.name}</span>
              <span className={`sc-state ${cls}`}>{lbl}</span>
            </div>
          );})}
        </div>
      </>}
      {total===0&&<div className="hint-box">
        <div>→ Enter a target domain or IP address and press <strong>ENGAGE</strong></div>
        <div>→ All 12 modules will run simultaneously</div>
        <div>→ Results will stream into the terminal below</div>
        <div style={{marginTop:8,color:'var(--amber)'}}>→ For Shodan & HIBP — switch to SINGLE mode and enter your API key</div>
      </div>}
    </div>
  );
}

function Sidebar({mode,setMode,selected,onSelect}){
  const cats=[...new Set(TOOLS.map(t=>t.cat))];
  return(
    <nav className="sidebar">
      <div className="mode-toggle">
        <button className={`mode-btn${mode==="all"?" active":""}`} onClick={()=>setMode("all")}>▶ RUN ALL</button>
        <button className={`mode-btn${mode==="single"?" active":""}`} onClick={()=>setMode("single")}>◈ SINGLE</button>
      </div>
      {cats.map(cat=><div key={cat}>
        <div className="cat-label">{cat}</div>
        {TOOLS.filter(t=>t.cat===cat).map(t=>(
          <div key={t.id}
            className={`tool-item${mode==="all"?" dim":""}${selected?.id===t.id&&mode==="single"?" active":""}`}
            onClick={()=>mode==="single"&&onSelect(t)}>
            <span className="t-icon">{t.icon}</span><span>{t.name}</span>
          </div>
        ))}
      </div>)}
    </nav>
  );
}

function Terminal({results,onClear}){
  const ref=useRef();
  useEffect(()=>{if(ref.current)ref.current.scrollTop=ref.current.scrollHeight;},[results]);
  return(
    <div className="terminal" ref={ref}>
      <div className="term-bar">
        <div className="term-dot" style={{background:"#c0392b"}}/>
        <div className="term-dot" style={{background:"#f39c12"}}/>
        <div className="term-dot" style={{background:"#27ae60"}}/>
        <span className="term-lbl">OUTPUT — {results.length} RECORDS</span>
        {results.length>0&&<button className="btn-purge" onClick={onClear}>CLEAR</button>}
      </div>
      {results.length===0&&<div className="term-empty">
        <span style={{color:"var(--amber)"}}>recon@kit:~$</span> awaiting target...<span className="cur"/>
      </div>}
      {results.map((r,i)=><div key={i} className="result-block">
        <div className="result-prompt">recon@kit:~$ <span className="result-tool">[{r.tool.toUpperCase()}]</span></div>
        <pre className={`result-body${r.ok?"":" result-err"}`}>{r.out}</pre>
        {i<results.length-1&&<hr className="result-div"/>}
      </div>)}
    </div>
  );
}

function App(){
  const [booted,setBooted]=useState(false);
  const [mode,setMode]=useState("all");
  const [tool,setTool]=useState(null);
  const [results,setResults]=useState([]);
  const [loading,setLoading]=useState(false);
  const add=r=>setResults(p=>[...p,r]);
  const clear=()=>setResults([]);

  return(
    <>
      {!booted&&<BootScreen onDone={()=>setBooted(true)}/>}
      <div className="app" style={{opacity:booted?1:0,transition:"opacity 0.5s ease"}}>
        <header className="header">
          <div className="classif">CLASSIFIED</div>
          <div>
            <div className="h-title">RECON<span>-</span>KIT</div>
            <div className="h-serial">INFORMATION GATHERING SYSTEM // EDUCATIONAL USE ONLY</div>
          </div>
          <div className="h-divider"/>
          <div style={{display:"flex",gap:16,alignItems:"center"}}>
            <div className="hstat"><span className="hstat-v">14</span><span className="hstat-l">MODULES</span></div>
            <div className="h-divider"/>
            <div className="hstat"><span className="hstat-v">{results.length}</span><span className="hstat-l">RESULTS</span></div>
          </div>
          <div className="header-right">
            <div className="hpill"><div className="live-dot"/><span>SYSTEM ONLINE</span></div>
            <div className="hpill"><span>localhost:8000</span></div>
          </div>
        </header>

        <Sidebar mode={mode} setMode={setMode} selected={tool} onSelect={setTool}/>

        <div className="main">
          <div className="hud-panel">
            {mode==="all"&&<RunAllMode onResult={add} clearResults={clear}/>}
            {mode==="single"&&!tool&&<div className="welcome">
              <div className="w-stamp">CLASSIFIED // AUTHORIZED USE ONLY</div>
              <div className="w-title">RECON<span>-</span>KIT</div>
              <div className="w-sub">Information Gathering System — Online</div>
              <div className="w-hint">▸ Select a module from the sidebar to begin</div>
              <div className="w-stats">
                <div className="w-stat"><span className="w-stat-n">14</span><span className="w-stat-l">MODULES</span></div>
                <div className="w-stat"><span className="w-stat-n">4</span><span className="w-stat-l">CATEGORIES</span></div>
                <div className="w-stat"><span className="w-stat-n">∞</span><span className="w-stat-l">TARGETS</span></div>
              </div>
            </div>}
            {mode==="single"&&tool&&<>
              <div className="tool-hdr">
                <div className="tool-tag">MODULE</div>
                <div className="tool-name">{tool.name}</div>
              </div>
              <div className="tool-desc">// {tool.desc}</div>
              <ToolForm tool={tool} onResult={add} loading={loading} setLoading={setLoading}/>
            </>}
          </div>
          <Terminal results={results} onClear={clear}/>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
